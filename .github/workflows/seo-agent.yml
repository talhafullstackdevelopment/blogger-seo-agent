name: SEO GEO AEO Agent

on:
  schedule:
    # Every Monday 06:00 UTC ( ~11:00 AM Pakistan time)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (audit, no auto-fix)"
        required: false
        default: "false"

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SEO/GEO/AEO agent
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_TOKEN: ${{ secrets.GOOGLE_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python seo_agent.py

      - name: Commit report back to repo
        run: |
          git config user.name "seo-agent-bot"
          git config user.email "actions@github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: SEO/GEO/AEO agent report $(date -u +%Y-%m-%d)"
          git push
